<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cookie Test</title>
  </head>
  <script>
    function login() {
      const name = document.getElementById("nameInput").value;
      if (!name) return;
      fetch("/login", {
        method: "POST",
        body: new URLSearchParams({ username: name }),
      }).then(() => location.reload());
    }

    function logout() {
      fetch("/logout", {
        method: "POST",
      }).then(() => location.reload());
    }
  </script>

  <body></body>
</html>
